<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prathish Thiyageson</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0c10;
      color: #e8eaf0;
      font-family: sans-serif;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 4rem;
      border-bottom: 1px solid #1e2130;
      background: #0b0c10;
      position: fixed;
      top: 0; left: 0; right: 0;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #00e5ff;
      text-decoration: none;
      letter-spacing: 3px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .nav-links a:hover { color: #00e5ff; }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: #00e5ff;
      border: 1px solid #00e5ff;
      padding: 0.3rem 1rem;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 4px;
      color: #e8eaf0;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .hero-name span { color: #00e5ff; }

    .hero-sub {
      font-size: 1.05rem;
      color: #6b7280;
      max-width: 520px;
      margin: 0 auto 2.5rem;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 2rem;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-decoration: none;
      border-radius: 3px;
      transition: all 0.25s;
      text-transform: uppercase;
    }

    .btn-primary {
      background: #00e5ff;
      color: #0b0c10;
      font-weight: 700;
      border: 2px solid #00e5ff;
    }
    .btn-primary:hover { background: transparent; color: #00e5ff; }

    .btn-outline {
      border: 2px solid #1e2130;
      color: #e8eaf0;
    }
    .btn-outline:hover { border-color: #00e5ff; color: #00e5ff; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">PT.</a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
<!-- HERO -->
  <section id="hero">
    <div>
      <span class="hero-tag">SOFTWARE ENGINEER · SRI LANKA</span>
      <h1 class="hero-name">PRATHISH<br><span>THIYAGE</span>SON</h1>
      <p class="hero-sub">
        BSc Software Engineering student building clean interfaces
        and leading data teams — currently at Orfium Sri Lanka.
      </p>
      <div class="hero-btns">
        <a href="#experience" class="btn btn-primary">View My Work</a>
        <a href="#contact" class="btn btn-outline">Get In Touch</a>
      </div>
    </div>
  </section>
</body>
</html>
